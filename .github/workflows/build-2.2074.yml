name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows (2.2074)
          os: windows-latest
        - name: Android32 (2.2074)
          os: ubuntu-latest
          target: Android32
        - name: Android64 (2.2074)
          os: ubuntu-latest
          target: Android64
        - name: macOS (2.2074)
          os: macos-latest
        - name: iOS (2.2074)
          os: macos-latest
          target: iOS        

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: 'geode-sdk/bindings'
          bindings-ref: '48d8fae'
          #build-config: 'RelWithDebInfo'
          build-config: 'Release'
          export-pdb: true
          combine: true
          build-args: '-DQOLMOD_22074'
          target: ${{ matrix.config.target }}
      
  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output (2.2074)
          path: ${{ steps.build.outputs.build-output }}
